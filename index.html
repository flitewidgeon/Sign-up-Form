<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign-up Form</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="main-container">
    <div class="left">
      <div class="logo">
        <img src="./images/odin-lined.png" alt="The 'Odin Project' logo: the face of the norse god 'Odin'">
        <h1>ODIN</h1>
      </div>
      <cite>
        Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </cite>
      
    </div>
    <div class="right">
      <div class="one">
        <div>
          <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
          <p>You <em>know</em> you want to.</p>
        </div>
      </div>

      <div class="two">
        <h3 class="form-title">Let's do this!</h3>
        <form action="" method="get" id="sign-up-form">
          <div>
            <p>
              <label for="first_name">FIRST NAME</label>
              <input type="text" id="first_name" name="first_name">
            </p>
            <p>
              <label for="user_email">EMAIL</label>
              <input type="email" id="user_email" name="email">
            </p>
            <p>
              <label for="user_password">PASSWORD</label>
              <input type="password" id="user_password" name="password" required>
            </p>
          </div>

          <div>
            <p>
              <label for="last_name">LAST NAME</label>
              <input type="text" id="last_name" name="last_name">
            </p>
            <p>
              <label for="phone_number">PHONE NUMBER</label>
              <input type="telephone" id="phone_number" name="phone_number">
            </p>
            <p>
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input type="password" id="confirm_password" name="confirm_password" required>
            </p>
          </div>
        </form>
      </div>
      <div class="three">
             <button type="submit" form="sign-up-form">Create Account</button>
      </div>
 
    </div>
  </div>
</body>
</html>
